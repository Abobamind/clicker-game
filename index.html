<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кликер с целями и магазином</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  background: linear-gradient(to bottom, #1e3c72, #2a5298);
  color: #fff;
}
h1 { margin-top: 20px; font-size: 40px; }
#score { font-size: 28px; margin: 15px 0; }

#scene {
  position: relative;
  width: 90%;
  max-width: 500px;
  height: 300px;
  margin: 0 auto 20px;
  background: #2a5298;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  cursor: pointer;
}

.floating {
  position: absolute;
  font-size: 20px;
  font-weight: bold;
  animation: floatUp 1s forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0px); }
  100% { opacity: 0; transform: translateY(-60px); }
}
.coinFall {
  position: absolute;
  font-size: 30px;
  animation: fall 1s linear forwards;
}
@keyframes fall {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(150px); opacity:0; }
}

.upgrade {
  display: inline-block;
  width: 140px;
  height: 50px;
  margin: 5px;
  background: #ff9800;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px #c77600;
  line-height: 50px;
  font-weight: bold;
  font-size: 16px;
  transition: 0.2s;
}
.upgrade.disabled { opacity: 0.5; cursor: not-allowed; }
.upgrade:active { transform: scale(1.05); box-shadow: 0 2px #c77600; }

.progress-container {
  width: 140px;
  height: 10px;
  background: #333;
  border-radius: 5px;
  margin: 5px auto 10px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: #ffeb3b;
  border-radius: 5px;
  transition: width 0.3s;
}

#shop {
  margin-top: 15px;
}
.shop-item {
  display: inline-block;
  width: 130px;
  height: 50px;
  margin: 5px;
  background: #4caf50;
  border-radius: 10px;
  cursor: pointer;
  line-height: 50px;
  font-weight: bold;
  font-size: 16px;
}
.shop-item.disabled { opacity: 0.4; cursor: not-allowed; }

#goals { margin: 15px auto; max-width: 500px; text-align: left; }
.goal { background: #222; margin: 5px; padding: 8px; border-radius: 8px; }
.goal.completed { background: #4caf50; color: #fff; font-weight: bold; }

/* Адаптив для телефонов */
@media (max-width: 600px) {
  h1 { font-size: 6vw; }
  #score { font-size: 5vw; }
  #scene { font-size: 20vw; height: 30vw; }
  .upgrade { width: 35vw; height: 10vw; line-height: 10vw; font-size: 4vw; }
  .progress-container { width: 35vw; height: 3vw; }
  .shop-item { width: 33vw; height: 10vw; line-height: 10vw; font-size: 4vw; }
}
</style>
</head>
<body>

<h1>💰 Кликер 💰</h1>
<div id="score">Очки: 0</div>

<div id="scene">🪙</div>

<div>
  <div class="upgrade" id="upgradeClick">+Click</div>
  <div class="progress-container"><div id="clickProgress" class="progress-bar"></div></div>

  <div class="upgrade" id="upgradeAuto">Auto+</div>
  <div class="progress-container"><div id="autoProgress" class="progress-bar"></div></div>

  <div class="upgrade" id="upgradeMultiplier">x2</div>
  <div class="progress-container"><div id="multiProgress" class="progress-bar"></div></div>
</div>

<h2>🎯 Цели</h2>
<div id="goals">
  <div class="goal" data-target="100">Набрать 100 очков: <span class="progress">0</span>/100</div>
  <div class="goal" data-target="500">Набрать 500 очков: <span class="progress">0</span>/500</div>
  <div class="goal" data-target="50" data-type="clicks">Сделать 50 кликов: <span class="progress">0</span>/50</div>
</div>

<h2>Магазин</h2>
<div id="shop">
  <div class="shop-item" id="hat">🎩 Шляпа (50)</div>
  <div class="shop-item" id="chest">💰 Сундук (100)</div>
</div>

<script>
let score = 0;
let clickPower = 1, clickUpgradeCost = 10;
let autoClickPower = 0, autoClickCost = 50;
let multiplier = 1, multiplierCost = 100;
let rewardsClaimed = {100:false,500:false,1000:false};
let totalClicks = 0;

// магазин цены
let hatPrice = 50;
let chestPrice = 100;

const scoreDisplay = document.getElementById('score');
const scene = document.getElementById('scene');
const uClick = document.getElementById('upgradeClick');
const uAuto = document.getElementById('upgradeAuto');
const uMult = document.getElementById('upgradeMultiplier');
const pClick = document.getElementById('clickProgress');
const pAuto = document.getElementById('autoProgress');
const pMult = document.getElementById('multiProgress');
const hat = document.getElementById('hat');
const chest = document.getElementById('chest');

scene.addEventListener('click', e => {
    addScore(clickPower * multiplier);
    totalClicks++;
    showFloating(e.clientX, e.clientY, clickPower * multiplier);
    spawnCoin();
    updateGoals();
});

function addScore(n) {
    score += n;
    updateUI();
    checkRewards();
}

function showFloating(x, y, n) {
    const el = document.createElement('div');
    el.className = 'floating';
    el.textContent = `+${n}`;
    el.style.left = (x - 20)+'px';
    el.style.top = (y - 20)+'px';
    document.body.appendChild(el);
    setTimeout(()=> el.remove(),1000);
}

function spawnCoin() {
    const c = document.createElement('div');
    c.className = 'coinFall';
    c.textContent = '🪙';
    c.style.left = Math.random()*window.innerWidth+'px';
    scene.appendChild(c);
    setTimeout(()=> c.remove(),1000);
}

function updateUI() {
    scoreDisplay.textContent = 'Очки: '+score;
    pClick.style.width = Math.min((score/clickUpgradeCost)*100,100) + '%';
    pAuto.style.width = Math.min((score/autoClickCost)*100,100) + '%';
    pMult.style.width = Math.min((score/multiplierCost)*100,100) + '%';
    uClick.classList.toggle('disabled', score < clickUpgradeCost);
    uAuto.classList.toggle('disabled', score < autoClickCost);
    uMult.classList.toggle('disabled', score < multiplierCost);
}

// апгрейды
uClick.addEventListener('click', ()=> {
    if(score >= clickUpgradeCost){ score -= clickUpgradeCost; clickPower++; clickUpgradeCost=Math.floor(clickUpgradeCost*1.5); updateUI(); }
});
uAuto.addEventListener('click', ()=> {
    if(score >= autoClickCost){ score -= autoClickCost; autoClickPower++; autoClickCost=Math.floor(autoClickCost*1.7); updateUI(); }
});
uMult.addEventListener('click', ()=> {
    if(score >= multiplierCost){ score -= multiplierCost; multiplier *= 2; multiplierCost=Math.floor(multiplierCost*2.5); updateUI(); }
});

// автоклик
setInterval(()=> { if(autoClickPower>0) addScore(autoClickPower*multiplier); }, 1000);

// награды
function checkRewards() {
    if(score >= 100 && !rewardsClaimed[100]) { alert('🎉 Награда за 100 очков!'); rewardsClaimed[100]=true; clickPower++; }
    if(score >= 500 && !rewardsClaimed[500]) { alert('🏆 Награда за 500 очков!'); rewardsClaimed[500]=true; multiplier*=2; }
    if(score >= 1000 && !rewardsClaimed[1000]) { alert('👑 Награда за 1000 очков!'); rewardsClaimed[1000]=true; autoClickPower+=5; }
}

// магазин с увеличением цены
hat.addEventListener('click', ()=> {
    if(score >= hatPrice){
        score -= hatPrice;
        clickPower += 2;
        hatPrice = Math.floor(hatPrice * 1.5);
        updateUI();
        hat.textContent = `🎩 Шляпа (${hatPrice})`;
        alert('Вы купили шляпу! +2 клик');
    }
});
chest.addEventListener('click', ()=> {
    if(score >= chestPrice){
        score -= chestPrice;
        autoClickPower += 5;
        chestPrice = Math.floor(chestPrice * 1.7);
        updateUI();
        chest.textContent = `💰 Сундук (${chestPrice})`;
        alert('Вы купили сундук! +5 автоклик');
    }
});

// система целей
function updateGoals() {
    document.querySelectorAll('#goals .goal').forEach(goal => {
        let target = parseInt(goal.dataset.target);
        let type = goal.dataset.type || 'score';
        let progressEl = goal.querySelector('.progress');
        let progress = type === 'clicks' ? totalClicks : score;
        progressEl.textContent = progress;

        if(progress >= target && !goal.classList.contains('completed')) {
            goal.classList.add('completed');
            alert(`🎯 Цель выполнена: ${goal.textContent}`);
        }
    });
}
</script>
</body>
</html>
